name: Scheduled Python Scripts

on:
  schedule:
    # Runs crawl_script.py daily at 12:00 AM UTC
    - cron: '0 0 * * *'

    # Runs bypass.py every 3 hours
    - cron: '0 */3 * * *'

  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Run crawl_script.py daily
        if: github.event.schedule == '0 0 * * *'
        run: |
          python crawl_script.py

      - name: Run bypass.py every 3 hours
        if: github.event.schedule == '0 */3 * * *'
        run: |
          python bypass.py
